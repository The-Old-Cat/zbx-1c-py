zabbix_export:
  version: "7.0"
  template_groups:
    - uuid: b91b8f978afa45ec90535a9467a60966
      name: "1C Servers"
  templates:
    - uuid: 6217edce72c8467880e95f5fb18910b1
      template: "1C Enterprise Monitoring"
      name: "1C Enterprise Monitoring"
      description: |
        Шаблон "1C Enterprise Monitoring" предназначен для мониторинга кластеров 1С:Предприятие с помощью инструмента zbx-1c-py.

        Терминология 1С:
        - Кластер — весь комплекс серверов 1С
        - Центральный сервер — управляет кластером (процесс ragent)
        - Рабочий сервер — физическая/виртуальная машина в кластере (хост с агентом ragent)
        - Рабочий процесс (rphost.exe) — процесс на Рабочем сервере, выполняющий код 1С

        Основные возможности:
        - Discovery rule "1C Clusters Discovery" автоматически обнаруживает все кластеры через rac utility.
        - Создаются dependent items от master item "zbx1cpy.metrics[{#CLUSTER.ID}]":
            - Cluster status: статус кластера (available/unavailable/unknown)
            - Total sessions: общее количество сессий в кластере
            - Active sessions: количество активных сессий (двухуровневый критерий: last-active-at ≤ 10 мин для Designer, ≤ 5 мин для остальных; либо hibernate=no + calls≥1 + bytes≥1024)
            - Total jobs: общее количество фоновых заданий (BackgroundJob, SystemBackgroundJob, JobScheduler)
            - Active jobs: количество активных фоновых заданий (JobScheduler всегда активен, остальные по hibernate=no)
            - Long running jobs: количество длительных заданий (BackgroundJob и SystemBackgroundJob)
            - Stuck jobs: количество «зависших» заданий (активные длительные задания выполняются >30 минут)
            - Max job duration: максимальное время выполнения среди активных заданий (минут)
            - Session limit: лимит сессий (берется из SESSION_LIMIT в .env, количество лицензий)
            - Session percent: процент заполнения сессий от лимита
            - Total servers: общее количество серверов в кластере
            - Working servers: количество Рабочих серверов в статусе "working"
            - Server memory used: фактическое использование памяти всеми Рабочими процессами (КБ)
            - Server memory limit: лимит памяти (КБ). Если 0 — лимит не задан в настройках кластера
            - Server memory percent: процент использования памяти (если лимит задан)
            - Memory limit set: флаг (1=лимит задан, 0=не задан)
            - Servers restarted recently: количество Рабочих серверов, перезапущенных за последние 5 минут
        - Создаются триггеры:
            - "Session usage > 90%": превышение 90% использования сессий
            - "Cluster is unavailable": кластер недоступен
            - "High average background jobs": среднее количество активных заданий > 5 за 5 проверок
            - "Total jobs growth > 100": резкий рост очереди заданий за 5 минут
            - "Background jobs stall detected": более 80% фоновых заданий активны
            - "Server memory usage > 85%": память Рабочих процессов превышает 85% (только если memory_limit_set=1)
      groups:
        - name: "1C Servers"
      items:
        - uuid: d8e5070eb9a74a45829aad35dc78c113
          name: "1C: Process Memory (all)"
          key: zbx1cpy.memory.all
          history: 7d
          value_type: LOG
          trends: "0"
          tags:
            - tag: App
              value: 1С
        - uuid: 08ffcb03044a47c196acbf85a17892ae
          name: "1C: ragent process memory"
          type: DEPENDENT
          key: zbx1cpy.memory.ragent
          delay: "0"
          units: B
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.ragent
            - type: MULTIPLIER
              parameters:
                - "1024"
          master_item:
            key: zbx1cpy.memory.all
          tags:
            - tag: App
              value: 1С
        - uuid: 70583dc88f3a4f6d9bcfc6ec5658be62
          name: "1C: rmngr process memory"
          type: DEPENDENT
          key: zbx1cpy.memory.rmngr
          delay: "0"
          units: B
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.rmngr
            - type: MULTIPLIER
              parameters:
                - "1024"
          master_item:
            key: zbx1cpy.memory.all
          tags:
            - tag: App
              value: 1С
        - uuid: f925a91a13e4464f864a1bd56bc43750
          name: "1C: rphost process memory"
          type: DEPENDENT
          key: zbx1cpy.memory.rphost
          delay: "0"
          units: B
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.rphost
            - type: MULTIPLIER
              parameters:
                - "1024"
          master_item:
            key: zbx1cpy.memory.all
          tags:
            - tag: App
              value: 1С
      discovery_rules:
        - uuid: 1cd3db8d376344eaa6d42fe2f3eade5e
          name: "1C Clusters Discovery"
          key: zbx1cpy.clusters.discovery
          delay: 10m
          description: |
            Discovery rule для обнаружения всех кластеров 1С.
            Создаёт dependent items и триггеры для каждого кластера.
          item_prototypes:
            - uuid: 3478367194024c5ca69fa36726249b8d
              name: "1C: Active background jobs [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.active_jobs[{#CLUSTER.ID}]"
              delay: "0"
              trends: "0"
              description: |
                Количество реально выполняющихся фоновых заданий в кластере.

                Критерии активности по типам заданий:
                - JobScheduler: всегда активен (планировщик регламентных заданий)
                - SystemBackgroundJob: активен, если hibernate = "no"
                - BackgroundJob: активен, если hibernate = "no"

                Используется для анализа нагрузки и обнаружения зависших заданий.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.active_jobs
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
              trigger_prototypes:
                - uuid: cfecf83689a2468580e6d8f9a0c5b8af
                  expression: "avg(/1C Enterprise Monitoring/zbx1cpy.cluster.active_jobs[{#CLUSTER.ID}],#5)>10"
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: "avg(/1C Enterprise Monitoring/zbx1cpy.cluster.active_jobs[{#CLUSTER.ID}],#5)<5"
                  name: "1C: High average background jobs on cluster {#CLUSTER.ID} (avg > 5 for 10 checks)"
                  opdata: "Current avg: {ITEM.VALUE1}"
                  priority: AVERAGE
                  description: |
                    Триггер срабатывает, если среднее количество активных фоновых заданий за 5 проверок
                    превышает 10. Считается признаком возможного зависания заданий.
                  tags:
                    - tag: App
                      value: 1С
            - uuid: 0c44fd000a6f480b9e63f88de8bf4546
              name: "1C: Active sessions [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.active_sessions[{#CLUSTER.ID}]"
              delay: "0"
              trends: "0"
              description: |
                Количество активных сессий в кластере за последние 5 минут.

                Критерии активности (двухуровневый):
                1. last-active-at ≤ порог → сессия активна:
                   - Designer (Конфигуратор): 10 минут
                   - Остальные приложения: 5 минут
                2. last-active-at > порог → строгая проверка:
                   - hibernate = "no"
                   - calls-last-5min ≥ 1
                   - bytes-last-5min ≥ 1024 байт

                Используется для мониторинга нагрузки на кластер.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.active_sessions
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
            - uuid: 6542814aef7c47388f426f113a935fd7
              name: "1C: Long running jobs [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.long_running_jobs[{#CLUSTER.ID}]"
              delay: "0"
              trends: "0"
              description: |
                Количество длительных фоновых заданий в кластере.

                Длительные задания — это задания типов:
                - BackgroundJob: фоновые задания пользователей
                - SystemBackgroundJob: системные фоновые задания

                Исключение: JobScheduler (планировщик) не считается длительным заданием.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.long_running_jobs
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
            - uuid: a2170d91c2ff42cd8d61a4dfd35126db
              name: "1C: Max job duration [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.max_job_duration[{#CLUSTER.ID}]"
              delay: "0"
              trends: "0"
              description: |
                Максимальное время выполнения среди активных фоновых заданий (в минутах).
                Используется для выявления зависших заданий.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.max_job_duration
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
            - uuid: dfe8743b19024519946b7b4430284162
              name: "1C: Memory limit set [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.memory_limit_set[{#CLUSTER.ID}]"
              delay: "0"
              value_type: FLOAT
              trends: "0"
              units: "%"
              description: |
                Флаг: задан ли лимит памяти в настройках Рабочего сервера (1=да, 0=нет).
                Если 0 — server_memory_percent не рассчитывается (возвращает 0).
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.memory_limit_set
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
            - uuid: b5fe6490ce7443a58f0eabd2005ec614
              name: "1C: Cluster Servers Restarted [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.servers_restarted_recently[{#CLUSTER.ID}]"
              delay: "0"
              trends: "0"
              description: |
                Количество Рабочих серверов (физических/виртуальных машин), перезапущенных за последние 5 минут.
                Выявляет аварийные перезагрузки.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.servers_restarted_recently
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
            - uuid: 64276e99c5f34e72802b5af182a1341c
              name: "1C: Server memory limit [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.server_memory_limit[{#CLUSTER.ID}]"
              delay: "0"
              value_type: FLOAT
              trends: "0"
              units: B
              description: |
                Лимит памяти для Рабочих процессов (rphost.exe) на серверах кластера (КБ → Bytes).
                Если 0 — лимит не задан в настройках кластера 1С.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.server_memory_limit
                - type: MULTIPLIER
                  parameters:
                    - "1048576"
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
            - uuid: 0817412b52c94de3b28d4d3e133f982a
              name: "1C: Server memory percent [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.server_memory_percent[{#CLUSTER.ID}]"
              delay: "0"
              trends: "0"
              units: "%"
              description: |
                Процент использования памяти всеми Рабочими процессами (rphost.exe) на серверах кластера.
                Рассчитывается только если memory_limit_set=1 (лимит памяти задан).
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.server_memory_percent
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
              trigger_prototypes:
                - uuid: d4af73f2b62640059fdfea1bea227c34
                  expression: "last(/1C Enterprise Monitoring/zbx1cpy.cluster.server_memory_percent[{#CLUSTER.ID}])>85"
                  name: "1C: Server memory usage > 85% on {#CLUSTER.NAME}"
                  opdata: "Current usage: {ITEM.LASTVALUE1}%"
                  priority: AVERAGE
                  tags:
                    - tag: App
                      value: 1C
            - uuid: d8a5c1ba13a04bb3a867f32663bbe2cb
              name: "1C: Server memory used [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.server_memory_used[{#CLUSTER.ID}]"
              delay: "0"
              value_type: FLOAT
              trends: "0"
              units: B
              description: "Фактическое использование памяти всеми Рабочими процессами (rphost.exe) на серверах кластера (КБ → Bytes)."
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.server_memory_used
                - type: MULTIPLIER
                  parameters:
                    - "1048576"
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
            - uuid: 6702af8b38434851bbaaaa1e39735e10
              name: "1C: Session limit [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.session_limit[{#CLUSTER.ID}]"
              delay: "0"
              trends: "0"
              units: "session licenses"
              description: "Лимит сессий кластера. Берется из SESSION_LIMIT в .env (количество лицензий)."
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.session_limit
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
            - uuid: 0752df59ffd24dc89ece2a81dfec234f
              name: "1C: Session usage percent [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.session_percent[{#CLUSTER.ID}]"
              delay: "0"
              trends: "0"
              units: "%"
              description: "Процент использования сессий от лимита (session_limit)."
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.session_percent
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
              trigger_prototypes:
                - uuid: 17bf559686a54f5793c5f985649a02c6
                  expression: "min(/1C Enterprise Monitoring/zbx1cpy.cluster.session_percent[{#CLUSTER.ID}],5m) > 90"
                  name: "1C: Cluster {#CLUSTER.NAME} session usage > 90%"
                  opdata: "Current load: {ITEM.LASTVALUE1}%"
                  priority: AVERAGE
                  description: |
                    Срабатывает при превышении 90% использования сессий кластера.
                    Необходима проверка нагрузки и освобождение сессий.
                  tags:
                    - tag: App
                      value: 1С
            - uuid: 2cac5b5bb2e8478b8c9b3227993fcf3b
              name: "1C: Cluster status [{#CLUSTER.NAME}]"
              key: "zbx1cpy.cluster.status[{#CLUSTER.ID}]"
              history: 7d
              value_type: TEXT
              trends: "0"
              description: '"Статус кластера: available | unavailable | unknown"'
              tags:
                - tag: App
                  value: 1С
              trigger_prototypes:
                - uuid: 6072080f819341379495fe4033a1cf09
                  expression: 'count(/1C Enterprise Monitoring/zbx1cpy.cluster.status[{#CLUSTER.ID}],#2,"ne","available")=2'
                  name: "1C: Cluster {#CLUSTER.NAME} is {ITEM.LASTVALUE}"
                  opdata: "Current status: {ITEM.LASTVALUE1}"
                  priority: HIGH
                  description: |
                    Срабатывает, если кластер недоступен 2 раза подряд.
                    Требуется проверка состояния серверов кластера.
                  tags:
                    - tag: App
                      value: 1С
            - uuid: 8f4b36c254524b2fbca789beca69b80a
              name: "1C: Stuck jobs [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.stuck_jobs[{#CLUSTER.ID}]"
              delay: "0"
              trends: "0"
              description: |
                Количество «зависших» фоновых заданий в кластере.

                Задание считается зависшим, если выполняются все условия:
                1. Тип задания: BackgroundJob или SystemBackgroundJob (длительные задания)
                2. Статус: активное (hibernate = "no")
                3. Время выполнения: > 30 минут

                Используется для выявления проблемных заданий, требующих вмешательства.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.stuck_jobs
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
            - uuid: 8ae4c7e526f34e90b83f555ecbceb0a9
              name: "1C: Total jobs [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.total_jobs[{#CLUSTER.ID}]"
              delay: "0"
              trends: "0"
              description: "Общее количество фоновых заданий в кластере (включая JobScheduler)."
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.total_jobs
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
              trigger_prototypes:
                - uuid: 0b6cb8eb00da428d819098c9cd869757
                  expression: "max(/1C Enterprise Monitoring/zbx1cpy.cluster.total_jobs[{#CLUSTER.ID}],5)-min(/1C Enterprise Monitoring/zbx1cpy.cluster.total_jobs[{#CLUSTER.ID}],5)>100"
                  name: "1C: Total jobs [{#CLUSTER.ID}].last(),5m)>100"
                  opdata: "Difference: {ITEM.VALUE1}, Total counter: {ITEM.LASTVALUE1}"
                  priority: AVERAGE
                  description: |
                    Срабатывает, если количество фоновых заданий резко увеличилось
                    за последние 5 минут (рост > 100). Требуется проверка очереди заданий.
                  tags:
                    - tag: App
                      value: 1С
            - uuid: a30e42c438ec458cb6c71e24a66df52e
              name: "1C: Total servers [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.total_servers[{#CLUSTER.ID}]"
              delay: "0"
              trends: "0"
              units: servers
              description: "Общее количество серверов (физических/виртуальных машин) в кластере."
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.total_servers
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
            - uuid: 5707738fa1a6433ca7f4911edc3cff0f
              name: "1C: Total sessions [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.total_sessions[{#CLUSTER.ID}]"
              delay: "0"
              trends: "0"
              units: sessions
              description: "Общее количество сессий в кластере (все подключения пользователей)."
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.total_sessions
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
            - uuid: c2790f43509c4a67ae46a3882ba40c72
              name: "1C: Working servers [{#CLUSTER.NAME}]"
              type: DEPENDENT
              key: "zbx1cpy.cluster.working_servers[{#CLUSTER.ID}]"
              delay: "0"
              trends: "0"
              units: servers
              description: 'Количество Рабочих серверов (физических/виртуальных машин) в кластере, которые находятся в статусе "working".'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.working_servers
              master_item:
                key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              tags:
                - tag: App
                  value: 1С
            - uuid: 08da3de1ef38415faa8d44d33b5e3f51
              name: "1C: Cluster Metrics [{#CLUSTER.NAME}]"
              key: "zbx1cpy.metrics[{#CLUSTER.ID}]"
              history: 7d
              value_type: LOG
              trends: "0"
              description: |
                Master item для всех dependent items.
                Содержит сырые данные метрик кластера в формате JSON.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.metrics
              tags:
                - tag: App
                  value: 1С
          trigger_prototypes:
            - uuid: 0e985395dce24956ada78dfa97c72c9b
              expression: |
                (last(/1C Enterprise Monitoring/zbx1cpy.cluster.active_jobs[{#CLUSTER.ID}]) /
                last(/1C Enterprise Monitoring/zbx1cpy.cluster.total_jobs[{#CLUSTER.ID}]) > 0.8)
                and
                last(/1C Enterprise Monitoring/zbx1cpy.cluster.total_jobs[{#CLUSTER.ID}]) > 10
              name: "1C: Background jobs stall detected (>80% active) on {#CLUSTER.NAME}"
              opdata: "Active: {ITEM.LASTVALUE1}, Total: {ITEM.LASTVALUE2}"
              priority: AVERAGE
              description: |
                Срабатывает, если более 80% всех фоновых заданий кластера активны.
                Требуется проверка зависших задач.
              tags:
                - tag: App
                  value: 1С
          graph_prototypes:
            - uuid: 303cb148ce0e40afaf53964a099496aa
              name: "1C: Cluster Jobs Performance  [{#CLUSTER.NAME}]"
              graph_items:
                - color: 199C0D
                  calc_fnc: ALL
                  item:
                    host: "1C Enterprise Monitoring"
                    key: "zbx1cpy.cluster.max_job_duration[{#CLUSTER.ID}]"
                - sortorder: "1"
                  color: F63100
                  calc_fnc: ALL
                  item:
