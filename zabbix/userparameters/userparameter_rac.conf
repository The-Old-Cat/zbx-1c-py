# --- Общее количество серверов ---
UserParameter=zbx1cpy.rac.total_servers[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli metrics $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('total_servers',0))"

# --- Количество информационных баз ---
UserParameter=zbx1cpy.rac.total_infobases[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli metrics $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('total_infobases',0))"

# ===========================================
# ПАМЯТЬ ПРОЦЕССОВ 1С (rphost, rmngr, ragent)
# ===========================================

# --- Полные данные о памяти (JSON) ---
UserParameter=zbx1cpy.rac.memory.all,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli memory

# --- Память rphost (рабочие процессы) ---
UserParameter=zbx1cpy.rac.memory.rphost,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli memory | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('rphost',{}).get('memory_mb',0))"

