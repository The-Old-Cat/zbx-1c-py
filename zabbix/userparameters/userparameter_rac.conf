# ===========================================
# UserParameter для мониторинга 1С через RAC
# ===========================================
# Пакет: zbx-1c-rac (модульная архитектура)
# Сгенерировано: 2026-03-05
# OS: Windows
# ===========================================
#
# Установка:
#   Windows: Копировать в C:\Program Files\Zabbix Agent 2\zabbix_agent2.d\
#   Linux:   Копировать в /etc/zabbix/zabbix_agent2.d/
#
# Перезапуск агента:
#   Windows: Restart-Service zabbix-agent2
#   Linux:   systemctl restart zabbix-agent2
#
# Проверка:
#   zabbix_get -s <host> -k zbx1cpy.rac.discovery
# ===========================================

# ===========================================
# ПАРАМЕТРЫ ДЛЯ ZABBIX AGENT 2 (Windows)
# ===========================================
# Замените пути на ваши:
#   PYTHON_EXE=G:\Automation\zbx-1c-py\.venv\Scripts\python.exe
#   PROJECT_DIR=G:\Automation\zbx-1c-py
# ===========================================

# --- LLD Discovery: обнаружение кластеров ---
UserParameter=zbx1cpy.rac.discovery,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli discovery

# --- Статус кластера: available | unavailable | unknown ---
UserParameter=zbx1cpy.rac.status[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli status $1

# --- Метрики кластера (сессии, задания, ИБ) ---
UserParameter=zbx1cpy.rac.metrics[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli metrics $1

# --- Метрики всех кластеров (для Master Item) ---
UserParameter=zbx1cpy.rac.metrics.all,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli metrics

# --- Проверка доступности RAS ---
UserParameter=zbx1cpy.rac.check,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli check

# --- Проверка конфигурации ---
UserParameter=zbx1cpy.rac.config.check,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli check-config

# --- Тест подключения ---
UserParameter=zbx1cpy.rac.test,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli test

# ===========================================
# ПРЯМЫЕ МЕТРИКИ (для элементов данных Zabbix)
# ===========================================

# --- Общее количество сессий ---
UserParameter=zbx1cpy.rac.total_sessions[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli metrics $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('total_sessions',0))"

# --- Активные сессии ---
UserParameter=zbx1cpy.rac.active_sessions[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli metrics $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('active_sessions',0))"

# --- Общее количество заданий ---
UserParameter=zbx1cpy.rac.total_jobs[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli metrics $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('total_jobs',0))"

# --- Активные фоновые задания ---
UserParameter=zbx1cpy.rac.active_jobs[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli metrics $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('active_jobs',0))"

# --- Лимит сессий ---
UserParameter=zbx1cpy.rac.session_limit[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli metrics $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('session_limit',0))"

# --- Процент заполнения сессий ---
UserParameter=zbx1cpy.rac.session_percent[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli metrics $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('session_percent',0))"

# --- Количество рабочих серверов ---
