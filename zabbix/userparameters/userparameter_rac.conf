# LLD Discovery (альтернативный способ)
UserParameter=zbx1cpy.rac.discovery.alt,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-discovery.exe"

# Статус кластера (альтернативный способ)
UserParameter=zbx1cpy.rac.status.alt[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-status.exe" $1

# Метрики (альтернативный способ)
UserParameter=zbx1cpy.rac.metrics.alt[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-metrics.exe" $1

# ===========================================
# ПРИМЕРЫ ИСПОЛЬЗОВАНИЯ В ZABBIX
# ===========================================
#
# 1. Обнаружение кластеров (LLD):
#    Key: zbx1cpy.rac.discovery
#    Type: Zabbix agent
#    Master item: No
#
# 2. Статус кластера (препроцессинг Map value):
#    Key: zbx1cpy.rac.status[{#ID}]
#    Type: Zabbix agent
#    Preprocessing: Map value: available→1, unavailable→0, unknown→2
#
# 3. Метрики сессий (препроцессинг JSONPath):
#    Key: zbx1cpy.rac.metrics[{#ID}]
#    Type: Zabbix agent
#    Preprocessing: JSONPath: $.metrics.total_sessions
#
# 4. Проверка RAS:
#    Key: zbx1cpy.rac.check
#    Type: Zabbix agent
#    Preprocessing: JSONPath: $.available
#
# ===========================================
