# --- Память ragent (агент кластеров) ---
UserParameter=zbx1cpy.rac.memory.ragent,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli memory | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('ragent',{}).get('memory_mb',0))"

# --- Общая память всех процессов 1С ---
UserParameter=zbx1cpy.rac.memory.total,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_rac.cli memory | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('total_mb',0))"

# ===========================================
# ДОПОЛНИТЕЛЬНЫЕ КОМАНДЫ (через entry points)
# ===========================================
