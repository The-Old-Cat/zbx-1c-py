# ===========================================
# UserParameter для мониторинга 1С через RAC
# ===========================================
# Пакет: zbx-1c-rac (модульная архитектура)
# Сгенерировано: 2026-03-10
# OS: Windows
# Mode: Entry Points
# LLD Macros: {#CLUSTER_ID}, {#CLUSTER_NAME}, {#CLUSTER_HOST}, {#CLUSTER_PORT}, {#CLUSTER_STATUS}
# ===========================================
# Установка:
#   Копировать в C:\Program Files\Zabbix Agent\zabbix_agentd.d\
# Перезапуск:
#   net stop "Zabbix Agent" && net start "Zabbix Agent"
# Проверка:
#   zabbix_get -s 127.0.0.1 -k z1c.rac.discovery
# ===========================================

# ===========================================
# LLD Discovery
# ===========================================

# Обнаружение кластеров (JSON для LLD)
# Возвращает: {#CLUSTER_ID}, {#CLUSTER_NAME}, {#CLUSTER_HOST}, {#CLUSTER_PORT}, {#CLUSTER_STATUS}
UserParameter=z1c.rac.discovery,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-discovery.exe"

# ===========================================
# Основные команды
# ===========================================

# Статус кластера: available | unavailable | unknown
UserParameter=z1c.rac.status[*],"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-status.exe" $1

# Метрики кластера (полный JSON)
UserParameter=z1c.rac.metrics[*],"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-metrics.exe" $1

# Метрики всех кластеров (Master Item)
UserParameter=z1c.rac.metrics.all,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-metrics.exe"

# Проверка доступности RAS
UserParameter=z1c.rac.check,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-check.exe"

# Проверка конфигурации
UserParameter=z1c.rac.config.check,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-check-config.exe"

# Тест подключения
UserParameter=z1c.rac.test,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-test.exe"

# ===========================================
# Память процессов 1С
# ===========================================

# Полные данные о памяти (JSON)
UserParameter=z1c.rac.memory.all,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-memory.exe"

# Память rphost (МБ)
UserParameter=z1c.rac.memory.rphost,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-memory.exe" | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('rphost',{}).get('memory_mb',0))"

# Память rmngr (МБ)
UserParameter=z1c.rac.memory.rmngr,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-memory.exe" | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('rmngr',{}).get('memory_mb',0))"

# Память ragent (МБ)
UserParameter=z1c.rac.memory.ragent,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-memory.exe" | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('ragent',{}).get('memory_mb',0))"

# Общая память всех процессов (МБ)
UserParameter=z1c.rac.memory.total,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-memory.exe" | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('total_mb',0))"

# ===========================================
# Прямые метрики (для элементов данных)
# ===========================================

# Сессии
UserParameter=z1c.rac.sessions.total[*],"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-metrics.exe" $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('total_sessions',0))"

UserParameter=z1c.rac.sessions.active[*],"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-metrics.exe" $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('active_sessions',0))"

UserParameter=z1c.rac.sessions.limit[*],"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-metrics.exe" $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('session_limit',0))"

UserParameter=z1c.rac.sessions.percent[*],"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-metrics.exe" $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('session_percent',0))"

# Задания
UserParameter=z1c.rac.jobs.total[*],"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-metrics.exe" $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('total_jobs',0))"

UserParameter=z1c.rac.jobs.active[*],"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-metrics.exe" $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('active_jobs',0))"

# Серверы
UserParameter=z1c.rac.servers.working[*],"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-metrics.exe" $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('working_servers',0))"

UserParameter=z1c.rac.servers.total[*],"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-metrics.exe" $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('total_servers',0))"

# Информационные базы
UserParameter=z1c.rac.infobases.total[*],"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-rac-metrics.exe" $1 | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('metrics',{}).get('total_infobases',0))"
