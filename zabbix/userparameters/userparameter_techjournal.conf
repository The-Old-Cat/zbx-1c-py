# ===========================================
# ОТПРАВКА МЕТРИК В ZABBIX (zabbix_sender)
# ===========================================
# Эти команды не для UserParameter, а для внешнего мониторинга
# Используйте в скриптах или планировщике задач

# --- Отправка метрик в Zabbix (период 5 мин) ---
# zbx-1c-techlog send --period 5

# --- Отправка метрик в Zabbix (период 15 мин) ---
# zbx-1c-techlog send --period 15

# --- Dry run (проверка без отправки) ---
# zbx-1c-techlog send --period 5 --dry-run

