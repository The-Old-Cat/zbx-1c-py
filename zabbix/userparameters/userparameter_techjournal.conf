# --- Средняя длительность ошибок (мс) ---
UserParameter=zbx1cpy.techjournal.errors.avg_duration_ms,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_techlog.cli collect --json-output | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('errors.avg_duration_ms',0))"

# --- Количество предупреждений (ATTN) ---
