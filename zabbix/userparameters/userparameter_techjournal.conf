# ===========================================
# UserParameter для мониторинга техжурнала 1С
# ===========================================
# Пакет: zbx-1c-techlog (модульная архитектура)
# Сгенерировано: 2026-03-05
# OS: Windows
# ===========================================
#
# Установка:
#   Windows: Копировать в C:\Program Files\Zabbix Agent 2\zabbix_agent2.d\
#   Linux:   Копировать в /etc/zabbix/zabbix_agent2.d/
#
# Перезапуск агента:
#   Windows: Restart-Service zabbix-agent2
#   Linux:   systemctl restart zabbix-agent2
#
# Проверка:
#   zabbix_get -s <host> -k zbx1cpy.techjournal.check
# ===========================================

# ===========================================
# ПАРАМЕТРЫ ДЛЯ ZABBIX AGENT 2 (Windows)
# ===========================================
# Замените пути на ваши:
#   PYTHON_EXE=G:\Automation\zbx-1c-py\.venv\Scripts\python.exe
#   PROJECT_DIR=G:\Automation\zbx-1c-py
# ===========================================

# --- Сбор метрик техжурнала (JSON) ---
UserParameter=zbx1cpy.techjournal.collect,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_techlog.cli collect --json-output

# --- Сбор метрик за указанный период (JSON) ---
UserParameter=zbx1cpy.techjournal.collect.period[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_techlog.cli collect --period $1 --json-output

# --- Текстовая сводка ---
UserParameter=zbx1cpy.techjournal.summary,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_techlog.cli summary

# --- Текстовая сводка за период ---
UserParameter=zbx1cpy.techjournal.summary.period[*],cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_techlog.cli summary --period $1

# --- Проверка доступности логов ---
UserParameter=zbx1cpy.techjournal.check,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_techlog.cli check

# ===========================================
# ПРЯМЫЕ МЕТРИКИ (для элементов данных Zabbix)
# ===========================================

# --- Общее количество событий ---
UserParameter=zbx1cpy.techjournal.total_events,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_techlog.cli collect --json-output | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('total_events',0))"

# --- Критичные события (EXCP, TDEADLOCK, TTIMEOUT) ---
UserParameter=zbx1cpy.techjournal.critical_events,cd /d "G:\Automation\zbx-1c-py" && "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -m zbx_1c_techlog.cli collect --json-output | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('critical_events',0))"

# --- Количество ошибок (EXCP) ---
