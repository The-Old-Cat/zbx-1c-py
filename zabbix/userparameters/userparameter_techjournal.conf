# Сбор метрик техжурнала (JSON)
UserParameter=zbx1cpy.techjournal.collect,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-techlog-collect.exe" --json-output

# Сбор метрик за период (JSON)
UserParameter=zbx1cpy.techjournal.collect.period[*],"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-techlog-collect.exe" --period $1 --json-output

# Текстовая сводка
UserParameter=zbx1cpy.techjournal.summary,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-techlog-summary.exe"

# Текстовая сводка за период
UserParameter=zbx1cpy.techjournal.summary.period[*],"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-techlog-summary.exe" --period $1

# Проверка доступности логов
UserParameter=zbx1cpy.techjournal.check,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-techlog-check.exe"

# Общее количество событий
UserParameter=zbx1cpy.techjournal.total_events,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-techlog-collect.exe" --json-output | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('total_events',0))"

# Критичные события (EXCP, TDEADLOCK, TTIMEOUT)
UserParameter=zbx1cpy.techjournal.critical_events,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-techlog-collect.exe" --json-output | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('critical_events',0))"

# Количество ошибок (EXCP)
UserParameter=zbx1cpy.techjournal.errors.count,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-techlog-collect.exe" --json-output | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('errors.count',0))"

# Количество deadlock (TDEADLOCK)
UserParameter=zbx1cpy.techjournal.deadlocks.count,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-techlog-collect.exe" --json-output | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('deadlocks.count',0))"

# Количество timeout (TTIMEOUT)
UserParameter=zbx1cpy.techjournal.timeouts.count,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-techlog-collect.exe" --json-output | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('timeouts.count',0))"

# Количество длительных блокировок (TLOCK)
UserParameter=zbx1cpy.techjournal.long_locks.count,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-techlog-collect.exe" --json-output | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('long_locks.count',0))"

# Количество медленных SQL-запросов
UserParameter=zbx1cpy.techjournal.slow_sql.count,"G:\Automation\zbx-1c-py\.venv\Scripts\zbx-1c-techlog-collect.exe" --json-output | "G:\Automation\zbx-1c-py\.venv\Scripts\python.exe" -c "import sys,json; d=json.load(sys.stdin); print(d.get('slow_sql.count',0))"
