[project]
name = "zbx-1c-techlog"
version = "0.1.0"
description = "Мониторинг 1С:Предприятия через техжурнал для Zabbix"
readme = "../../README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Артем Коваленко", email = "ar-kovale@yandex.ru" }]
keywords = ["zabbix", "monitoring", "1c", "techjournal", "logs"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "loguru>=0.7.2",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.12.0",
    "click>=8.0.0",
    "fastapi>=0.129.0",
    "uvicorn>=0.40.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "black>=24.0.0",
    "pylint>=3.0.0",
    "mypy>=1.8.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "black>=24.0.0",
    "pylint>=3.0.0",
    "mypy>=1.8.0",
    "httpx>=0.25.0",
]

[project.scripts]
zbx-1c-techlog = "zbx_1c_techlog.cli.__main__:cli"
zbx-1c-techlog-collect = "zbx_1c_techlog.cli.__main__:collect"
zbx-1c-techlog-send = "zbx_1c_techlog.cli.__main__:send"
zbx-1c-techlog-summary = "zbx_1c_techlog.cli.__main__:summary"
zbx-1c-techlog-check = "zbx_1c_techlog.cli.__main__:check_logs"
zbx-1c-techlog-structure = "zbx_1c_techlog.cli.__main__:show_structure"
# API server
zbx-1c-techlog-api = "zbx_1c_techlog.api.server:main"

[project.urls]
Homepage = "https://github.com/your-repo/zbx-1c"
Repository = "https://github.com/your-repo/zbx-1c"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zbx_1c_techlog"]

[tool.hatch.version]
path = "src/zbx_1c_techlog/__init__.py"

[tool.black]
line-length = 100
target-version = ['py310', 'py311', 'py312']

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = ["-ra", "--strict-markers", "--strict-config"]
markers = [
    "unit: marks tests as unit tests",
    "integration: marks tests as integration tests",
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
disallow_untyped_defs = true
files = ["src/**/*.py"]

[[tool.mypy.overrides]]
module = ["loguru", "pydantic.*", "requests"]
ignore_missing_imports = true
