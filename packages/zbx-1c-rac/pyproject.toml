[project]
name = "zbx-1c-rac"
version = "0.1.0"
description = "Мониторинг 1С:Предприятия через RAC для Zabbix"
readme = "../../README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Артем Коваленко", email = "ar-kovale@yandex.ru" }]
keywords = ["zabbix", "monitoring", "1c", "rac", "enterprise"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "loguru>=0.7.2",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.12.0",
    "psutil>=5.9.0",
    "click>=8.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "black>=24.0.0",
    "pylint>=3.0.0",
    "mypy>=1.8.0",
]
api = [
    "fastapi>=0.129.0",
    "uvicorn>=0.40.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "black>=24.0.0",
    "pylint>=3.0.0",
    "mypy>=1.8.0",
]

[project.scripts]
zbx-1c-rac = "zbx_1c_rac.cli.__main__:cli"
zbx-1c-rac-check = "zbx_1c_rac.cli.__main__:check_ras"
zbx-1c-rac-discovery = "zbx_1c_rac.cli.__main__:discovery"
zbx-1c-rac-clusters = "zbx_1c_rac.cli.__main__:list_clusters"
zbx-1c-rac-metrics = "zbx_1c_rac.cli.__main__:get_metrics"
zbx-1c-rac-status = "zbx_1c_rac.cli.__main__:get_cluster_status"
zbx-1c-rac-infobases = "zbx_1c_rac.cli.__main__:get_infobases_cmd"
zbx-1c-rac-sessions = "zbx_1c_rac.cli.__main__:get_sessions_cmd"
zbx-1c-rac-jobs = "zbx_1c_rac.cli.__main__:get_jobs_cmd"
zbx-1c-rac-memory = "zbx_1c_rac.cli.__main__:get_process_memory"
zbx-1c-rac-test = "zbx_1c_rac.cli.__main__:test_connection"
zbx-1c-rac-check-config = "zbx_1c_rac.cli.__main__:check_config_cmd"

[project.urls]
Homepage = "https://github.com/your-repo/zbx-1c"
Repository = "https://github.com/your-repo/zbx-1c"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zbx_1c_rac"]

[tool.hatch.version]
path = "src/zbx_1c_rac/__init__.py"

[tool.black]
line-length = 100
target-version = ['py310', 'py311', 'py312']

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = ["-ra", "--strict-markers", "--strict-config"]
markers = [
    "unit: marks tests as unit tests",
    "integration: marks tests as integration tests",
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
disallow_untyped_defs = true
files = ["src/**/*.py"]

[[tool.mypy.overrides]]
module = ["loguru", "pydantic.*", "psutil"]
ignore_missing_imports = true
