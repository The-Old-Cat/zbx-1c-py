[project]
name = "zbx-1c-publisher"
version = "0.1.0"
description = "Автопубликация информационных баз 1С:Предприятия с генерацией VRD"
readme = "../../README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Артем Коваленко", email = "ar-kovale@yandex.ru" }]
keywords = ["zabbix", "1c", "publisher", "vrd", "webinst"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "loguru>=0.7.2",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.12.0",
    "click>=8.0.0",
    "lxml>=5.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "black>=24.0.0",
    "pylint>=3.0.0",
    "mypy>=1.8.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "black>=24.0.0",
    "pylint>=3.0.0",
    "mypy>=1.8.0",
]

[project.scripts]
zbx-1c-publisher = "zbx_1c_publisher.cli.__main__:cli"
zbx-1c-publish = "zbx_1c_publisher.cli.__main__:cli"

[project.urls]
Homepage = "https://github.com/your-repo/zbx-1c"
Repository = "https://github.com/your-repo/zbx-1c"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zbx_1c_publisher"]

[tool.hatch.version]
path = "src/zbx_1c_publisher/__init__.py"

[tool.black]
line-length = 100
target-version = ['py310', 'py311', 'py312']

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = ["-ra", "--strict-markers", "--strict-config"]
markers = [
    "unit: marks tests as unit tests",
    "integration: marks tests as integration tests",
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
disallow_untyped_defs = true
files = ["src/**/*.py"]

[[tool.mypy.overrides]]
module = ["loguru", "pydantic.*", "lxml"]
ignore_missing_imports = true
